<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Verity</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="vertical">
  <div id="titlebar">
    <div id="brand" title="Verity">
      <!-- PLACEHOLDER "V"-Monogramm — durch finales Branding ersetzen -->
      <svg viewBox="0 0 24 24">
        <path d="M4 5 L12 19 L20 5" fill="none" stroke="currentColor"
              stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>Verit<i>y</i></span>
    </div>
    <div id="drag-fill"></div>
    <div id="tabs-host"></div>
  </div>

  <div id="shell">
    <div id="card-frame"></div>

    <aside id="chrome">
      <div id="toolbar">
        <button id="btn-back" class="icon-btn" title="Zurück" aria-label="Zurück">
          <svg viewBox="0 0 24 24"><path d="M15 5 8 12l7 7" /></svg>
        </button>
        <button id="btn-forward" class="icon-btn" title="Vor" aria-label="Vor">
          <svg viewBox="0 0 24 24"><path d="m9 5 7 7-7 7" /></svg>
        </button>
        <button id="btn-reload" class="icon-btn" title="Neu laden" aria-label="Neu laden">
          <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v5h-5" /></svg>
        </button>
        <span class="toolbar-spring"></span>
        <span id="mullvad-badge" class="icon-btn" title="Mullvad VPN aktiv (experimentell)" hidden>
          <svg viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6l-7-3z" /><path d="M9 12l2 2 4-4" /></svg>
        </span>
        <button id="btn-reader" class="icon-btn" title="Reader-Modus" aria-label="Reader-Modus">
          <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z" /><path d="M8 9h8M8 13h8M8 17h5" /></svg>
        </button>
        <button id="btn-pip" class="icon-btn" title="Bild-in-Bild" aria-label="Bild-in-Bild">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" /><rect x="12" y="11" width="7" height="6" rx="1" /></svg>
        </button>
        <button id="btn-split" class="icon-btn" title="Split View (Strg+Alt+S)" aria-label="Split View">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="M12 5v14" /></svg>
        </button>
        <button id="btn-sidebar" class="icon-btn" title="Compact-Modus" aria-label="Compact-Modus">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="M9 5v14" /></svg>
        </button>
      </div>

      <form id="addressform" autocomplete="off">
        <span id="shield" title="Blockierte Anfragen auf diesem Tab">
          <svg viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6l-7-3z" /></svg>
          <b id="shield-count">0</b>
        </span>
        <input id="address" type="text" spellcheck="false" placeholder="Suchen oder Adresse eingeben" />
      </form>

      <div id="pinned"></div>

      <div id="workspaces" role="tablist" aria-label="Workspaces"></div>

      <div id="side-tabs">
        <div id="tabstrip" role="tablist" aria-label="Tabs"></div>
        <button id="btn-newtab" class="sb-newtab" title="Neuer Tab (Strg+T)">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
          <span>Neuer Tab</span>
        </button>
      </div>

      <div id="sb-bottom">
        <button id="btn-settings" class="icon-btn" title="Einstellungen" aria-label="Einstellungen">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" /><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2.4l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 21h4l.5-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6c.07-.4.1-.8.1-1.2z" /></svg>
        </button>
        <button id="btn-dashboard" class="icon-btn" title="Sicherheits-Dashboard" aria-label="Dashboard">
          <svg viewBox="0 0 24 24"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2" /></svg>
        </button>
        <button id="btn-history" class="icon-btn" title="Verlauf" aria-label="Verlauf">
          <svg viewBox="0 0 24 24"><path d="M12 8v4l3 2M3 12a9 9 0 1 0 9-9 9 9 0 0 0-8 5M3 4v4h4" /></svg>
        </button>
        <button id="btn-themes" class="icon-btn" title="Themes &amp; Editor" aria-label="Themes">
          <svg viewBox="0 0 24 24"><path d="M12 21a9 9 0 1 1 9-9c0 2-1.5 3-3 3h-2a2 2 0 0 0-1.5 3.4c.6.7.2 2.6-2.5 2.6z" /></svg>
        </button>
        <button id="btn-vault" class="icon-btn" title="Passwort-Tresor" aria-label="Tresor">
          <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2" /><path d="M8 10V7a4 4 0 0 1 8 0v3" /></svg>
        </button>
        <button id="btn-ai" class="icon-btn" title="KI-Assistent (lokal)" aria-label="KI-Assistent">
          <svg viewBox="0 0 24 24"><path d="M12 3a4 4 0 0 1 4 4v1h1a3 3 0 0 1 0 6h-1v1a4 4 0 0 1-8 0v-1H7a3 3 0 0 1 0-6h1V7a4 4 0 0 1 4-4z" /><circle cx="10" cy="11" r=".5" /><circle cx="14" cy="11" r=".5" /></svg>
        </button>
        <span class="sb-spring"></span>
        <button id="btn-screenshot" class="icon-btn" title="Screenshot (Strg+Umschalt+S)" aria-label="Screenshot">
          <svg viewBox="0 0 24 24"><path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" /><path d="M3 7h3l2-3h8l2 3h3v13H3z" /></svg>
        </button>
      </div>
    </aside>

    <main id="content">
      <div id="empty-hint">
        <div class="logo-mark">
          <!-- PLACEHOLDER "V"-Monogramm — durch finales Branding ersetzen -->
          <svg viewBox="0 0 24 24">
            <path d="M4 5 L12 19 L20 5" fill="none" stroke="currentColor"
                  stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <p>Verity</p>
      </div>
    </main>
  </div>

  <section id="panel" hidden>
    <div id="panel-card">
      <header id="panel-head">
        <h2 id="panel-title"></h2>
        <button id="panel-close" class="icon-btn" title="Schließen" aria-label="Schließen">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18" /></svg>
        </button>
      </header>
      <div id="panel-body"></div>
    </div>
  </section>

  <div id="cmd" hidden>
    <div id="cmd-card">
      <input id="cmd-input" type="text" spellcheck="false"
             placeholder="Tab wechseln, Adresse öffnen oder suchen…" />
      <div id="cmd-list"></div>
    </div>
  </div>

  <div id="toast" hidden></div>

  <section id="onboarding" hidden>
    <div id="onb-card">
      <div id="onb-progress"></div>
      <div id="onb-body"></div>
      <footer id="onb-foot">
        <button id="onb-back" class="btn">Zurück</button>
        <span id="onb-step-label"></span>
        <button id="onb-next" class="btn primary">Weiter</button>
      </footer>
    </div>
  </section>

  <script src="./ui.js"></script>
</body>
</html>
