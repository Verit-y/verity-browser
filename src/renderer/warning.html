<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
  <title>Verity Shield – Seite blockiert</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0c0d10; color: #e8e9ec;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 560px; width: 100%;
      background: #14161b; border: 1px solid #2a2d35;
      border-top: 3px solid #e5484d;
      border-radius: 12px; padding: 36px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      color: #e5484d; font-weight: 600; font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .badge svg { width: 18px; height: 18px; stroke: #e5484d; fill: none; stroke-width: 2; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .url {
      font-family: Consolas, monospace; font-size: 13px; color: #9aa0aa;
      word-break: break-all; background: #0c0d10; border: 1px solid #2a2d35;
      border-radius: 6px; padding: 8px 10px; margin: 14px 0;
    }
    p.reason { color: #c2c6cd; font-size: 14px; line-height: 1.55; }
    .actions { display: flex; gap: 10px; margin-top: 26px; flex-wrap: wrap; }
    .btn {
      border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer;
      border: 1px solid #2a2d35; background: transparent; color: #e8e9ec;
      text-decoration: none; display: inline-block;
    }
    .btn.primary { background: #e8e9ec; color: #0c0d10; border-color: #e8e9ec; font-weight: 600; }
    .btn.ghost { color: #9aa0aa; font-size: 12.5px; border: none; }
    .btn:hover { opacity: 0.85; }
    footer { margin-top: 22px; font-size: 11.5px; color: #696f7a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6l-7-3z"/><path d="M12 9v4m0 3h.01"/></svg>
      Verity Shield
    </div>
    <h1 id="threat-type">Seite blockiert</h1>
    <div class="url" id="threat-url"></div>
    <p class="reason" id="threat-reason"></p>
    <div class="actions">
      <button class="btn primary" id="btn-back">Zurück zur Sicherheit</button>
      <a class="btn ghost" id="btn-proceed" href="#">Risiko akzeptieren und trotzdem fortfahren</a>
    </div>
    <footer>Der Schutz lässt sich unter Einstellungen → Sicherheit &amp; Datenschutz anpassen.</footer>
  </div>
  <script>
    (() => {
      const params = new URLSearchParams(location.hash.slice(1));
      const url = params.get('u') || '';
      document.getElementById('threat-type').textContent = params.get('t') || 'Seite blockiert';
      document.getElementById('threat-url').textContent = url;
      document.getElementById('threat-reason').textContent = params.get('r') || '';
      document.getElementById('btn-back').addEventListener('click', () => {
        if (history.length > 1) history.back();
        else location.href = 'https://duckduckgo.com';
      });
      // Intercepted by the main process (will-navigate) - whitelists the
      // host for this session and performs the real navigation.
      document.getElementById('btn-proceed').href =
        'https://proceed.verity.invalid/?u=' + encodeURIComponent(url);
    })();
  </script>
</body>
</html>
