<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
  <title>Neuer Tab</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    :root {
      --fg: #f4f4f4;
      --muted: #9a9ca3;
      --accent: #7c5cff;
    }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 30px;
      background:
        radial-gradient(1100px 700px at 70% 0%, rgba(124, 92, 255, 0.14), transparent 60%),
        radial-gradient(900px 600px at 20% 110%, rgba(80, 120, 255, 0.10), transparent 55%),
        #121317;
      color: var(--fg);
      font-family: 'Inter', 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
      font-weight: 400;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .hero { text-align: center; animation: rise .6s cubic-bezier(.2,.8,.2,1); }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .greeting {
      font-size: 52px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.05;
    }
    .sub {
      margin-top: 14px; font-size: 16px; font-weight: 400; color: var(--muted);
      letter-spacing: 0.01em;
    }
    .clock {
      margin-top: 26px; font-size: 15px; color: var(--muted);
      display: inline-flex; align-items: center; gap: 10px;
    }
    .clock b { color: var(--fg); font-weight: 500; font-variant-numeric: tabular-nums; }

    form {
      width: min(540px, 86vw);
      display: flex; align-items: center; gap: 12px;
      padding: 0 18px; height: 52px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
      animation: rise .6s cubic-bezier(.2,.8,.2,1) .05s both;
      backdrop-filter: blur(12px);
    }
    form:focus-within {
      border-color: rgba(124, 92, 255, 0.55);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.12), 0 10px 40px rgba(0, 0, 0, 0.35);
    }
    form svg { width: 17px; height: 17px; stroke: var(--muted); fill: none; stroke-width: 2; flex: none; }
    input {
      flex: 1; min-width: 0; border: none; outline: none; background: transparent;
      color: var(--fg); font-size: 15px; font-family: inherit; font-weight: 400;
    }
    input::placeholder { color: #70737b; }

    .links { display: flex; gap: 26px; animation: rise .6s cubic-bezier(.2,.8,.2,1) .1s both; }
    .links a {
      color: var(--muted); font-size: 13px; text-decoration: none;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: color .15s ease, transform .15s ease;
    }
    .links a:hover { color: var(--fg); transform: translateY(-2px); }
    .links .dot {
      width: 44px; height: 44px; border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid; place-items: center;
      font-size: 17px; font-weight: 500; color: var(--fg);
      transition: background .15s ease, border-color .15s ease;
    }
    .links a:hover .dot { background: rgba(124, 92, 255, 0.18); border-color: rgba(124, 92, 255, 0.4); }
  </style>
</head>
<body>
  <div class="hero">
    <div class="greeting" id="greeting">Guten Abend</div>
    <div class="sub" id="sub">Ein ruhiger, privater Ort zum Beginnen.</div>
    <div class="clock"><b id="time">–</b><span id="date"></span></div>
  </div>

  <form id="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" autofocus spellcheck="false" placeholder="Suchen oder Adresse eingeben" />
  </form>

  <div class="links" id="links"></div>

  <script>
    (() => {
      const params = new URLSearchParams(location.hash.slice(1));
      const engineUrl = params.get('e') || 'https://duckduckgo.com/?q=';

      const now = new Date();
      const h = now.getHours();
      const greeting = h < 5 ? 'Gute Nacht' : h < 11 ? 'Guten Morgen' : h < 17 ? 'Guten Tag' : h < 22 ? 'Guten Abend' : 'Gute Nacht';
      document.getElementById('greeting').textContent = greeting;
      const fmtDate = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
      document.getElementById('date').textContent = fmtDate;
      const tick = () => {
        document.getElementById('time').textContent =
          new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      };
      tick(); setInterval(tick, 10000);

      const shortcuts = [
        { label: 'G', name: 'Google', url: 'https://www.google.com' },
        { label: 'Y', name: 'YouTube', url: 'https://www.youtube.com' },
        { label: 'R', name: 'Reddit', url: 'https://www.reddit.com' },
        { label: 'GH', name: 'GitHub', url: 'https://github.com' },
        { label: 'C', name: 'ChatGPT', url: 'https://chatgpt.com' },
      ];
      const host = document.getElementById('links');
      for (const s of shortcuts) {
        const a = document.createElement('a');
        a.href = s.url;
        a.innerHTML = '<span class="dot">' + s.label + '</span>' + s.name;
        host.appendChild(a);
      }

      document.getElementById('search').addEventListener('submit', (ev) => {
        ev.preventDefault();
        const raw = document.getElementById('q').value.trim();
        if (!raw) return;
        if (/^[a-z][a-z0-9+.-]*:/i.test(raw)) { location.href = raw; return; }
        if (!/\s/.test(raw) && raw.includes('.')) { location.href = 'https://' + raw; return; }
        location.href = engineUrl + encodeURIComponent(raw);
      });
    })();
  </script>
</body>
</html>
