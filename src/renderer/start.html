<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
  <title>Neuer Tab</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    :root {
      --fg: #e6e8ec;
      --muted: #8b8d93;
    }
    body {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 30px;
      background:
        radial-gradient(680px 480px at 50% 34%, rgba(255, 255, 255, 0.030), transparent 70%),
        radial-gradient(1200px 900px at 82% -12%, rgba(255, 255, 255, 0.020), transparent 60%),
        #0f0f11;
      color: var(--fg);
      font-family: 'Inter', 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
      font-weight: 400;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* Feines Vignette für Tiefe. */
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(120% 120% at 50% 40%, transparent 60%, rgba(0, 0, 0, 0.28));
    }
    .hero { position: relative; z-index: 1; text-align: center; animation: rise .7s cubic-bezier(.2,.8,.2,1); }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    .greeting {
      font-size: 44px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.06;
    }
    .sub {
      margin-top: 12px; font-size: 15px; font-weight: 400; color: var(--muted);
    }
    .clock {
      margin-top: 22px; font-size: 14px; color: var(--muted);
      display: inline-flex; align-items: center; gap: 10px;
    }
    .clock b { color: var(--fg); font-weight: 500; font-variant-numeric: tabular-nums; }

    form {
      position: relative; z-index: 1;
      width: min(560px, 88vw);
      display: flex; align-items: center; gap: 12px;
      padding: 0 18px; height: 50px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 10px 40px rgba(0, 0, 0, 0.35);
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
      animation: rise .7s cubic-bezier(.2,.8,.2,1) .06s both;
      backdrop-filter: blur(14px);
    }
    form:focus-within {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset, 0 14px 50px rgba(0, 0, 0, 0.42);
    }
    form svg { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; flex: none; }
    input {
      flex: 1; min-width: 0; border: none; outline: none; background: transparent;
      color: var(--fg); font-size: 14px; font-family: inherit; font-weight: 400;
    }
    input::placeholder { color: #6b6d73; }

    .links { position: relative; z-index: 1; display: flex; gap: 22px; animation: rise .7s cubic-bezier(.2,.8,.2,1) .12s both; }
    .links a {
      color: var(--muted); font-size: 12px; text-decoration: none;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: color .15s ease, transform .15s ease;
    }
    .links a:hover { color: var(--fg); transform: translateY(-1px); }
    .links .dot {
      width: 42px; height: 42px; border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      display: grid; place-items: center;
      font-size: 15px; font-weight: 500; color: var(--fg);
      transition: background .15s ease, border-color .15s ease;
    }
    .links a:hover .dot { background: rgba(255, 255, 255, 0.09); border-color: rgba(255, 255, 255, 0.14); }
  </style>
</head>
<body>
  <div class="hero">
    <div class="greeting" id="greeting">Guten Abend</div>
    <div class="sub" id="sub">Ein ruhiger, privater Ort zum Beginnen.</div>
    <div class="clock"><b id="time">–</b><span id="date"></span></div>
  </div>

  <form id="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" autofocus spellcheck="false" placeholder="Suchen oder Adresse eingeben" />
  </form>

  <div class="links" id="links"></div>

  <script>
    (() => {
      const params = new URLSearchParams(location.hash.slice(1));
      const engineUrl = params.get('e') || 'https://duckduckgo.com/?q=';

      const now = new Date();
      const h = now.getHours();
      const greeting = h < 5 ? 'Gute Nacht' : h < 11 ? 'Guten Morgen' : h < 17 ? 'Guten Tag' : h < 22 ? 'Guten Abend' : 'Gute Nacht';
      document.getElementById('greeting').textContent = greeting;
      const fmtDate = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
      document.getElementById('date').textContent = fmtDate;
      const tick = () => {
        document.getElementById('time').textContent =
          new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      };
      tick(); setInterval(tick, 10000);

      let shortcuts = [
        { label: 'G', name: 'Google', url: 'https://www.google.com' },
        { label: 'Y', name: 'YouTube', url: 'https://www.youtube.com' },
        { label: 'R', name: 'Reddit', url: 'https://www.reddit.com' },
        { label: 'GH', name: 'GitHub', url: 'https://github.com' },
        { label: 'C', name: 'ChatGPT', url: 'https://chatgpt.com' },
      ];
      try {
        const parsed = JSON.parse(params.get('p') || '[]');
        if (Array.isArray(parsed) && parsed.length) shortcuts = parsed;
      } catch (e) { /* Standard-Verknüpfungen behalten */ }
      const host = document.getElementById('links');
      for (const s of shortcuts) {
        const a = document.createElement('a');
        a.href = s.url;
        a.innerHTML = '<span class="dot">' + s.label + '</span>' + s.name;
        host.appendChild(a);
      }

      document.getElementById('search').addEventListener('submit', (ev) => {
        ev.preventDefault();
        const raw = document.getElementById('q').value.trim();
        if (!raw) return;
        if (/^[a-z][a-z0-9+.-]*:/i.test(raw)) { location.href = raw; return; }
        if (!/\s/.test(raw) && raw.includes('.')) { location.href = 'https://' + raw; return; }
        location.href = engineUrl + encodeURIComponent(raw);
      });
    })();
  </script>
</body>
</html>
