<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- SP3 Browser App-Icon: Fuchs-P-Marke auf schwarzer Glas-Kachel mit Neon-Kante.
       Für Installer zu .ico/.icns konvertieren - siehe docs/BUILD.md -->
  <defs>
    <radialGradient id="tile" cx="28%" cy="18%" r="110%">
      <stop offset="0%" stop-color="#222428"/>
      <stop offset="55%" stop-color="#0c0d0f"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="glow" x1="484" y1="300" x2="300" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8ec5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#508cff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pband" x1="250" y1="120" x2="430" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4f6f8"/>
      <stop offset="45%" stop-color="#aab2bb"/>
      <stop offset="100%" stop-color="#5c636c"/>
    </linearGradient>
    <linearGradient id="foxfill" x1="240" y1="100" x2="300" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#dde2e8"/>
      <stop offset="100%" stop-color="#7a828c"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Kachel -->
  <rect x="28" y="28" width="456" height="456" rx="104" fill="url(#tile)"/>
  <rect x="29.5" y="29.5" width="453" height="453" rx="102.5" fill="none"
        stroke="url(#rim)" stroke-width="3"/>

  <!-- Neon-Kante unten rechts -->
  <path d="M484 300 V380 A104 104 0 0 1 380 484 H300" fill="none"
        stroke="url(#glow)" stroke-width="10" stroke-linecap="round" filter="url(#soft)"/>
  <path d="M484 300 V380 A104 104 0 0 1 380 484 H300" fill="none"
        stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- P-Bogen -->
  <path d="M306 148 H336 A104 104 0 0 1 336 356 H286" fill="none"
        stroke="#ffffff" stroke-opacity="0.16" stroke-width="62" stroke-linecap="round"/>
  <path d="M306 148 H336 A104 104 0 0 1 336 356 H286" fill="none"
        stroke="url(#pband)" stroke-width="54" stroke-linecap="round"/>

  <!-- Fuchs (Kopf, Ohren, Körper bis zur Schweifspitze) -->
  <path d="M206 104
           C220 122 232 138 240 152
           C246 142 252 128 262 116
           C268 134 270 148 268 160
           C292 168 312 184 322 206
           C330 214 332 222 326 230
           C310 238 290 240 272 238
           C260 256 256 280 264 308
           C274 348 288 392 298 434
           C282 424 266 404 254 378
           C234 338 214 282 204 226
           C198 190 198 144 206 104 Z"
        fill="url(#foxfill)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2"/>

  <!-- Dunkle Kontur im Körper (Brust/Schweif-Trennung) -->
  <path d="M268 252
           C260 296 268 352 288 404
           C282 354 278 300 282 254
           C278 252 272 251 268 252 Z"
        fill="#101216" fill-opacity="0.85"/>
</svg>
