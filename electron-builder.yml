appId: com.verity.browser
productName: Verity
copyright: © 2026 Verity Project (MIT)

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - themes/**
  - package.json

# Auto-Update via GitHub Releases (electron-updater liest diese Quelle).
publish:
  provider: github
  owner: Verit-y
  repo: verity-browser

win:
  target:
    - nsis
  # build/icon.ico erzeugen – siehe docs/BUILD.md (aus assets/icon.svg konvertieren)
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - dmg
  category: public.app-category.productivity
  hardenedRuntime: true

linux:
  executableName: verity-browser
  target:
    - AppImage
    - deb
    - tar.gz
  category: Network
  synopsis: Der anpassbarste Datenschutz-Browser der Welt.
  desktop:
    StartupWMClass: Verity
