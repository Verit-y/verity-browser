name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Dependency audit (high+)
        run: npm run audit
        # Audit soll informieren, den Build aber nicht hart brechen.
        continue-on-error: true
